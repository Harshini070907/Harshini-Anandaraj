<div class="grid-container">

    <!-- EASY -->
    <div class="category-box">
        <h2>Easy <span class="badge easy"></span></h2>
        <ul>
            {% for q in result["Easy"] %}
                <li>{{ q }}</li>
            {% endfor %}
        </ul>
    </div>

    <!-- MEDIUM -->
    <div class="category-box">
        <h2><span class="badge medium">Medium</span></h2>
        <ul>
            {% for q in result["Medium"] %}
                <li>{{ q }}</li>
            {% endfor %}
        </ul>
    </div>

    <!-- HARD -->
    <div class="category-box">
        <h2><span class="badge hard">Hard</span></h2>
        <ul>
            {% for q in result["Hard"] %}
                <li>{{ q }}</li>
            {% endfor %}
        </ul>
    </div>

</div>
